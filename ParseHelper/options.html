<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>B站视频解析助手 - 设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      max-width: 600px;
      width: 100%;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 36px 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 24px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eee;
    }
    .setting-group {
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 14px;
      font-family: monospace;
      transition: all 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    .help-text {
      font-size: 12px;
      color: #999;
      margin-top: 6px;
      line-height: 1.6;
    }
    .help-text code {
      background: #f0f0f0;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
    }
    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 12px 28px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #667eea;
      color: white;
    }
    .btn-primary:hover {
      background: #5a67d8;
    }
    .btn-secondary {
      background: #e0e0e0;
      color: #555;
    }
    .btn-secondary:hover {
      background: #d0d0d0;
    }
    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .status.success {
      background: #e8f5e9;
      color: #2e7d32;
      display: block;
    }
    .status.error {
      background: #ffebee;
      color: #c62828;
      display: block;
    }
    .example {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px 20px;
      margin-top: 24px;
    }
    .example h3 {
      font-size: 13px;
      color: #555;
      margin-bottom: 8px;
    }
    .example pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 12px;
      overflow-x: auto;
      font-family: monospace;
      margin: 0;
      line-height: 1.8;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>🎬 设置</h1>
    <div class="subtitle">自定义B站视频解析服务器</div>

    <div class="setting-group">
      <label>🔗 解析服务器地址</label>
      <input type="text" id="parserUrl" placeholder="https://your-worker.workers.dev/parse?url=">
      <div class="help-text">
        服务器需接受 <code>?url=BVxxxx</code> 与 <code>&p=2</code> 参数，返回视频直链或302重定向
      </div>
    </div>

    <div class="button-row">
      <button class="btn btn-primary" id="saveBtn">💾 保存设置</button>
      <button class="btn btn-secondary" id="resetBtn">↩️ 恢复默认</button>
    </div>

    <div id="status" class="status"></div>

    <div class="example">
      <h3>📌 使用说明</h3>
      <pre>1. 在B站任意页面右键点击视频封面/标题
2. 选择「复制B站解析链接」
3. 链接已复制到剪贴板（右下角提示）
4. 粘贴到VRChat或其他播放器播放

📌 在视频页面右键空白处，会自动复制当前页视频
📌 在首页/搜索结果页，请直接右键点击视频卡片</pre>
    </div>
  </div>
  <div class="footer">💡 设置自动保存到你的浏览器账号</div>
</div>
<script src="options.js"></script>
</body>
</html>
